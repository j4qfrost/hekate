name: Bug report
description: Report a bug in the server, CLI, web client, or lexicons.
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Tell us what you saw, including the command or URL involved.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - server
        - cli
        - web
        - lexicons
        - deploy / docker compose
        - other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
      description: Output of `hekate version`, server image tag, or git SHA.
  - type: textarea
    id: logs
    attributes:
      label: Logs / output (optional)
      render: text
